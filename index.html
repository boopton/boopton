<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boopton | Home</title>
    <style>
        .gradient-text {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(90deg, #ff0000, #00ff00, #0000ff, #ff0000);
            background-size: 300% 100%; /* Make background wider than the text */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent; /* Hide original text color to reveal gradient */
            animation: flow 4s linear infinite;
        }   

        @keyframes flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }
    </style>
</head>
<body>
    <h1 style="font-size: 100vw" class="gradient-text"></h1>
</body>
</html>
